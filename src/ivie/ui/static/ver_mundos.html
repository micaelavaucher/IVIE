<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Chat MongoDB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .input-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .info {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 14px;
            color: #555;
        }
        
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .chat-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }
        
        .metadata {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 4px solid #667eea;
        }
        
        .metadata-item {
            margin: 5px 0;
            font-size: 14px;
            color: #555;
        }
        
        .metadata-item strong {
            color: #333;
        }
        
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .turn-header {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 18px 18px 4px 18px;
            margin-left: 20%;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        
        .system-message {
            background: #f1f3f4;
            color: #333;
            padding: 15px 20px;
            border-radius: 18px 18px 18px 4px;
            margin-right: 20%;
            line-height: 1.6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .initial-narration {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            color: #2d3436;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 5px solid #fdcb6e;
            box-shadow: 0 2px 8px rgba(253, 203, 110, 0.3);
        }
        
        .initial-narration h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            display: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="input-section">
            <h1>📝 Visualizador de Chat MongoDB</h1>
            <div class="info">
                Pega aquí el documento JSON que copiaste de MongoDB. El visualizador mostrará la conversación en formato chat.
            </div>
            <textarea id="jsonInput" placeholder='Pega aquí tu documento JSON de MongoDB...'></textarea>
            <button onclick="parseAndDisplay()">Mostrar Chat</button>
            <div class="error" id="errorMsg"></div>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="metadata" id="metadata"></div>
            <div id="messages"></div>
        </div>
    </div>

    <script>
        function parseAndDisplay() {
            const input = document.getElementById('jsonInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const chatContainer = document.getElementById('chatContainer');
            
            errorMsg.style.display = 'none';
            errorMsg.textContent = '';
            
            if (!input) {
                showError('Por favor, pega un documento JSON');
                return;
            }
            
            try {
                const data = JSON.parse(input);
                
                if (!data.turns) {
                    showError('El documento no tiene el campo "turns"');
                    return;
                }
                
                displayMetadata(data);
                displayChat(data.turns);
                chatContainer.style.display = 'block';
                chatContainer.scrollIntoView({ behavior: 'smooth' });
                
            } catch (e) {
                showError('Error al parsear JSON: ' + e.message);
            }
        }
        
        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }
        
        function displayMetadata(data) {
            const metadataDiv = document.getElementById('metadata');
            const createdDate = data.created_at ? new Date(data.created_at * 1000).toLocaleString('es-ES') : 'N/A';
            
            metadataDiv.innerHTML = `
                <div class="metadata-item"><strong>🌍 World ID:</strong> ${data.world_id || 'N/A'}</div>
                <div class="metadata-item"><strong>👤 Nickname:</strong> ${data.nickname || 'N/A'}</div>
                <div class="metadata-item"><strong>🌐 Idioma:</strong> ${data.language || 'N/A'}</div>
                <div class="metadata-item"><strong>💡 Inspiración:</strong> ${data.inspiration || 'N/A'}</div>
                <div class="metadata-item"><strong>📅 Creado:</strong> ${createdDate}</div>
            `;
        }
        
        function displayChat(turns) {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            
            // Convertir el objeto turns a array y ordenar por clave numérica
            const turnEntries = Object.entries(turns).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
            
            turnEntries.forEach(([turnNum, turn]) => {
                const turnNumber = parseInt(turnNum);
                
                // Turno 0: solo mostrar la narración inicial
                if (turnNumber === 0) {
                    if (turn.initial_rendered_world_state) {
                        const initialMsg = document.createElement('div');
                        initialMsg.className = 'initial-narration';
                        initialMsg.innerHTML = `
                            <h3>🎬 Narración Inicial</h3>
                            <div>${formatText(turn.initial_rendered_world_state)}</div>
                        `;
                        messagesDiv.appendChild(initialMsg);
                    }
                } else {
                    // Para turnos > 0: mostrar input del usuario y narración
                    const messageGroup = document.createElement('div');
                    messageGroup.className = 'message';
                    
                    // Header del turno
                    const header = document.createElement('div');
                    header.className = 'turn-header';
                    header.textContent = `Turno ${turnNumber} - ${turn.date || 'N/A'}`;
                    messageGroup.appendChild(header);
                    
                    // Input del usuario
                    if (turn.user_input) {
                        const userMsg = document.createElement('div');
                        userMsg.className = 'user-message';
                        userMsg.textContent = turn.user_input;
                        messageGroup.appendChild(userMsg);
                    }
                    
                    // Narración del sistema
                    if (turn.narration) {
                        const systemMsg = document.createElement('div');
                        systemMsg.className = 'system-message';
                        systemMsg.innerHTML = formatText(turn.narration);
                        messageGroup.appendChild(systemMsg);
                    }
                    
                    messagesDiv.appendChild(messageGroup);
                }
            });
        }
        
        function formatText(text) {
            // Reemplazar saltos de línea por <br> y preservar formato
            return text.replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
